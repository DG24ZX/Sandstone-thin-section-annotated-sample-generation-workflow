# Example configuration for one-angle XPL/PPL thin-section image generation.
# Replace paths with your own local data paths.

raw:
  label_raw: "3D_rock_data/C22_x250y250z1.raw"
  dissolution_raw: "3D_rock_data/FDD.raw"
  cement_raw: null
  shape: [1, 250, 250]       # (z, y, x)
  slice_index: 0
  resize_to: [1024, 1024]    # (width, height), or null

particle_libraries:
  quartz: "v2_keli_data/quartzData"
  feldspar: "v2_keli_data/feldsparData"
  lithic: "v2_keli_data/rockchipsData"

# Folder names under each mineral particle library.
# The code can also auto-detect xpl/cross/cross_1 and ppl/single if these are omitted.
texture_folders:
  xpl: "cross_1"
  ppl: "single"

output:
  output_dir: "generated_dataset"
  sample_name: "sample_0001"
